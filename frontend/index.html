<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Enterprise RAG Learning Assistant</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <div class="container">

        <header>

            <h1>Enterprise RAG Learning Assistant</h1>

            <p>
                FastAPI • GPT-4o-mini • Hybrid Retrieval • ChromaDB
            </p>

        </header>

        <main>

            <div id="chat-window">

            </div>

            <div class="input-area">

                <textarea
                    id="question"
                    placeholder="Ask a question..."
                ></textarea>

                <button id="send-button">

                    Send

                </button>

            </div>

        </main>

    </div>

    <script src="app.js"></script>

</body>

</html>
